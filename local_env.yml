- name: Collecting Facts
  hosts: local
  gather_facts: yes
  become: yes
  #vars_files: "encrypted.yml"

- name: Set up local development environment
  hosts: local
  roles:
  - role: packages
    tags: office, home
  - role: bin
    tags: home.office
  - role: oh_my_zsh
    tags: bootstrap, home, office 
  - role: git
    tags: home, office
  - role: emacs
    tags: emacs, home, office
  - role: apmplanner
    tags: apmplanner, home
  - role: i3
    tags: home, office
