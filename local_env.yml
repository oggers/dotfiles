- name: Collecting Facts
  hosts: local
  gather_facts: yes
  become: yes

- name: Set up local development environment
  hosts: local
  roles:
  - packages
  - bin
  - {role: oh_my_zsh, tags: ['bootstrap']} 
  - git
  - {role: emacs, tags: ['emacs']}
  - {role: apmplanner, tags: ['apmplanner']}
