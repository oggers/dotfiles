---
# file: roles/docker/tasks/main.yml
- name: Installs docker package
  package: name="{{ item }}" state=latest
  with_items:
    - docker
    - docker-compose
    - python-docker
  become: yes

- name: Enable and start docker
  systemd:
    name: docker
    state: started
    enabled: yes
  become: yes

- name: Add docker group to user
  user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: yes
  become: yes