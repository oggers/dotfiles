---
# file: i3/tasks/main.yml

- name: Install antergos i3
  package:
    name: "{{ item }}"
    state: present
  become: yes
  with_items:
    - antergos-i3-meta
    - ttf-font-awesome

- name: Configure i3
  template:
    src: templates/config.j2
    dest: "{{ ansible_user_dir }}/.config/i3/config"
  notify: Restart i3
