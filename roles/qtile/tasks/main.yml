---
# roles/qtile/tasks/main.yml
- name: Install qtile and dependencies
  package:
    name: "{{ item }}"
    state: latest
  become: yes
  with_items:
    - "{{ qtile_packages }}"

- name: Copy config.py
  copy:
    src: "files/config.py"
    dest: "{{ ansible_user_dir }}/.config/qtile"

- name: Copy autostart
  copy:
    src: "files/autostart.sh"
    dest: "{{ ansible_user_dir }}/.config/qtile/"
    mode: 0755

- name: Config rofi
  copy:
    src: "files/config.rasi"
    dest: "{{ ansible_user_dir }}/.config/rofi/"
