---
# file: alacritty/tasks/main.yml
- name: "{{ role_name }} | Checking for Distribution Config: {{ ansible_facts['distribution'] }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts['distribution'] }}.yml"
  delegate_to: localhost
  register: distribution_config

- name: "{{ role_name }} | Run Tasks: {{ ansible_facts['distribution'] }}"
  ansible.builtin.include_tasks: "{{ ansible_facts['distribution'] }}.yml"
  when: distribution_config.stat.exists

- name: "Alacritty | Get themes"
  ansible.builtin.git:
    repo: https://github.com/alacritty/alacritty-theme
    dest: "{{ ansible_facts['user_dir'] }}/.config/alacritty/themes"

- name: "Alacritty | Create config directory"
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.config/alacritty"
    state: directory

- name: "Alacritty | setconfig file"
  ansible.builtin.copy:
    src: "{{ role_path }}/files/alacritty.toml"
    dest: "{{ ansible_facts['user_dir'] }}/.config/alacritty/"
    force: yes
