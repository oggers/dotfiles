- name: "{{ role_name }} | update .zshrc"
  ansible.builtin.blockinfile:
    path: "{{ emacs_home }}/.zshrc"
    prepend_newline: yes
    append_newline: yes
    create: yes
    marker: "# {mark} ANSIBLE MANAGED BLOCK role emacs"
    block: |
      alias e="emacsclient -t -a ''"
      export EDITOR="e"
      export VISUAL="$EDITOR"
  become: yes
  become_user: "{{ emacs_user }}"

- name: "{{ role_name }} | update .bashrc"
  ansible.builtin.blockinfile:
    path: "{{ emacs_home }}/.bashrc"
    prepend_newline: yes
    append_newline: yes
    create: yes
    marker: "# {mark} ANSIBLE MANAGED BLOCK role emacs"
    block: |
      alias e="emacsclient -t -a ''"
      export EDITOR="e"
      export VISUAL="$EDITOR"
  become: yes
  become_user: "{{ emacs_user }}"

- name: "{{ role_name }} systemd"
  block:
    
    - name: Create user systemd directory
      ansible.builtin.file:
        path: "{{ emacs_home }}/.config/systemd/user"
        state: directory
        mode: '0755'
      become: yes
      become_user: "{{ emacs_user }}"

    - name: "{{ role_name }} | Copy unit file"
      ansible.builtin.copy:
        src: files/my-emacs.service
        dest: "{{ emacs_home }}/.config/systemd/user/my-emacs.service"
        mode: '0644'
      become: yes
      become_user: "{{ emacs_user }}"

    - name: "{{ role_name }} | Enable and start emacs server"
      ansible.builtin.systemd_service:
        name: my-emacs
        daemon_reload: true
        enabled: true
        state: started
        scope: user
      become: yes
      become_user: "{{ emacs_user }}"

  when: inventory_hostname == 'localhost'
