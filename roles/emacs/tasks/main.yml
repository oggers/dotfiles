---
# file: roles/emacs/tasks/main.yml
- name: "{{ role_name }} | Checking for Distribution Config: {{ ansible_facts['distribution'] }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts['distribution'] }}.yml"
  delegate_to: localhost
  register: distribution_config

- name: "{{ role_name }} | Run Tasks: {{ ansible_facts['distribution'] }}"
  ansible.builtin.include_tasks: "{{ ansible_facts['distribution'] }}.yml"
  when: distribution_config.stat.exists

- name: "{{ role_name }} | Check if ruff command exists"
  ansible.builtin.command: ruff --version
  register: ruff_check
  ignore_errors: true
  changed_when: false

- name: "{{ role_name }} | Install ruff"
  ansible.builtin.command: "uv tool install ruff"
  when: ruff_check.rc != 0

- name: "{{ role_name }} | Check if ty command exists"
  ansible.builtin.command: ty --version
  register: ty_check
  ignore_errors: true
  changed_when: false

- name: "{{ role_name }} | Install ty"
  ansible.builtin.command: "uv tool install ty"
  when: ty_check.rc != 0

- name: "{{ role_name }} | Link home doom"
  ansible.builtin.file:
    src: "{{ role_path }}/files/doom/"
    dest: "{{ emacs_home }}/.config/doom"
    state: link
  become: yes
  become_user: "{{ emacs_user }}"
  register: result_doom_dir
  when: inventory_hostname == 'localhost'

- name: "{{ role_name }} | Copy home doom"
  ansible.builtin.copy:
    src: "{{ role_path }}/files/doom"
    dest: "{{ emacs_home }}/.config/doom/"
  become: yes
  become_user: "{{ emacs_user }}"
  register: result_doom_dir
  when: inventory_hostname != 'localhost'

- name: "{{ role_name }} | Download doom"
  ansible.builtin.git:
    repo: "https://github.com/doomemacs/doomemacs"
    depth: 1
    dest: "{{ emacs_home }}/.config/emacs"
  become: yes
  become_user: "{{ emacs_user }}"
  register: result_download_doom

- name: "{{ role_name }} | Install doom"
  ansible.builtin.command: "{{ emacs_home }}/.config/emacs/bin/doom --force install"
  become: yes
  become_user: "{{ emacs_user }}"
  when: result_doom_dir.changed

- name: "{{ role_name }} | Sync doom"
  ansible.builtin.command: "{{ emacs_home }}/.config/emacs/bin/doom sync"
  become: yes
  become_user: "{{ emacs_user }}"
  when: result_doom_dir.changed or result_download_doom.changed

- name: "{{ role_name }} | Graphical stuff"
  block:
    - name: "{{ role_name }} | Create desktop directory"
      ansible.builtin.file:
        path: "{{ emacs_home }}/.local/share/applications"
        state: directory
      become: yes
      become_user: "{{ emacs_user }}"

    - name: "{{ role_name }} | Install org-protocol desktop file"
      ansible.builtin.template:
        src: "{{ role_path }}/templates/org-protocol.desktop.j2"
        dest: "{{ emacs_home }}/.local/share/applications/org-protocol.desktop"
      register: result_org_protocol
      become: yes
      become_user: "{{ emacs_user }}"

    - name: "{{ role_name }} | Refresh cache database of mime types handled by desktop files"
      ansible.builtin.command: update-desktop-database "{{ emacs_home }}/.local/share/applications"
      when: result_org_protocol.changed
      become: yes
      become_user: "{{ emacs_user }}"

    - name: "{{ role_name }} | Refresh org-protocol handler"
      ansible.builtin.command: xdg-mime default org-protocol.desktop x-scheme-handler/org-protocol
      when: result_org_protocol.changed
      become: yes
      become_user: "{{ emacs_user }}"

    - name: "{{ role_name }} | link org directory"
      ansible.builtin.file:
        src: "{{ emacs_home }}/Sync/{{ item }}"
        dest: "{{ emacs_home }}/{{ item }}"
        force: yes
        state: link
      with_items:
        - org
        - org-roam
      become: yes
      become_user: "{{ emacs_user }}"

  when: "session_type.stdout.lower() not in ['', 'tty']"

- name: "{{ role_name }} | ~/.emacs and ~/.emacs.d not present"
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - "{{ emacs_home }}/.emacs"
    - "{{ emacs_home }}/.emacs.d"
  become: yes
  become_user: "{{ emacs_user }}"

