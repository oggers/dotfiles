---
# file: emacs/tasks/Debian.yml
- name: "{{ role_name }} Check if session type is x11 or wayland"
  ansible.builtin.command: echo $XDG_SESSION_TYPE
  register: session_type
  changed_when: false

- name: "{{ role_name }} | Install emacs x11"
  ansible.builtin.apt:
    name: emacs
    state: present
  become: yes
  become_user: root
  when: "'x11' in session_type.stdout.lower()"

- name: "{{ role_name }} | Install emacs wayland"
  ansible.builtin.apt:
    name: emacs-wayland
    state: present
  become: yes
  become_user: root
  when: "'wayland' in session_type.stdout.lower()"

- name: "{{ role_name }} | Install emacs nox"
  ansible.builtin.apt:
    name: emacs-nox
    state: present
  become: yes
  become_user: root
  when: "session_type.stdout.lower() == ''"

- name: "{{ role_name }} | Install shell packages"
  ansible.builtin.apt:
    name:
      - ripgrep
      - fd-find
      - shellcheck
      - make
      - cmake
      - texlive-binaries
      - texlive-base
      - texlive-science
      - keychain
    state: present
    update_cache: yes
  become: yes
  become_user: root
