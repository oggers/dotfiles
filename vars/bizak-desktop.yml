---
# file: vars/bizak-desktop.yml

i3_workspaces:
  - name: "1: Firefox-oggers "
    output: primary
    assign:
      - class: "Firefox-oggers"
    gaps: {'inner': 0, 'outer': 0}
  - name: "2: Emacs "
    output: primary
    assign:
      - class: "Emacs"
  - name: 3
  - name: "4: Virtualbox "
    assign:
      - class: "VirtualBox"
    output: primary
    gaps: {'inner': 0, 'outer': 0}
  - name: 5
  - name: 6
  - name: 7
  - name: 8
  - name: "9: Firefox-jcn "
    output: HDMI1
    assign:
      - class: "Firefox-jcn"
    gaps: {'inner': 0, 'outer': 0}
  - name: 10
i3_autostart:
  - command: "xrandr --output HDMI2 --mode 1920x1080 --pos 0x0 --rotate normal --output HDMI1 --mode 1680x1050 --pos 1920x0 --rotate normal --output DP2 --off --output DP1 --off --output VIRTUAL1 --off"
    no_startup_id: yes
  - command: "dropbox start"
    no_startup_id: yes

i3_numlock_on: yes

ssh_config:
