---
# file: vars/home.yml

i3_workspaces:
  - name: "1: Firefox "
    output: primary
    assign:
      - class: "Firefox"
    gaps: {'inner': 0, 'outer': 0}
  - name: "2: Emacs "
    output: primary
    assign:
      - class: "Emacs"
  - name: 3
  - name: "4: Virtualbox "
    assign:
      - class: "VirtualBox"
    output: primary
    gaps: {'inner': 0, 'outer': 0}
  - name: 5
  - name: 6
  - name: 7
  - name: 8
  - name: 9
  - name: 10

i3_autostart:
  - command: "dropbox start"
    no_startup_id: yes

i3_battery: yes

i3_numlock_on: yes

ssh_config:
  config:
    - Host: apymtest.apanymantel.com
      hostname: apymtest.apanymantel.com
      port: 22222
    - Host: apym1.apanymantel.com
      hostname: apym1.apanymantel.com
      port: 22222
    - Host: vps.oggers.com.es
      hostname: vps.oggers.com.es
      port: 22222
